<section class="catalogo">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.buscador{
text-align:center;
margin:20px;
}

.buscador input{
padding:10px;
width:300px;
border-radius:5px;
border:1px solid #ccc;
}

.filtros{
text-align:center;
margin-bottom:20px;
}

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.producto{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.producto img{
width:100%;
border-radius:8px;
}

.precio{
font-size:20px;
font-weight:bold;
}

.boton{
display:block;
margin:6px;

color:white;
text-decoration:none;

}

.paypal{

}

.mercadopago{

}

.agotado{

}

</style>

  <div class="buscador">

<input type="text" id="buscar" placeholder="Buscar jugador o equipo">

</div>

  <script>

document.getElementById("buscar").addEventListener("keyup",function(){

let filtro=this.value.toLowerCase()

document.querySelectorAll(".producto").forEach(producto=>{

let texto=producto.innerText.toLowerCase()

producto.style.display=texto.includes(filtro)?"block":"none"

})

})

</script>

  <div class="filtros">

<select id="filtroTalla">

<option value="todas">Todas las tallas</option>
<option value="M">M</option>
<option value="L">L</option>
<option value="XL">XL</option>
<option value="2XL">2XL</option>

</select>

</div>

  <script>

document.getElementById("filtroTalla").addEventListener("change",function(){

let talla=this.value

document.querySelectorAll(".producto").forEach(producto=>{

if(talla=="todas"){

producto.style.display="block"

}else{

producto.style.display=
producto.dataset.talla==talla?"block":"none"

}

})

})

</script>
