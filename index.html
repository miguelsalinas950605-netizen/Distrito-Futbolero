<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Distrito Futbolero</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header>
<h1>⚽ Distrito Futbolero</h1>

<div class="carrito-icono">
🛒 <span id="contador">0</span>
</div>

</header>

<div class="controles">

<input id="buscar" placeholder="Buscar jugador o equipo">

<select id="filtroTalla">
<option value="todas">Todas las tallas</option>
<option value="M">M</option>
<option value="L">L</option>
<option value="XL">XL</option>
<option value="2XL">2XL</option>
</select>

</div>

<div id="catalogo" class="catalogo"></div>

<div class="carrito">

<h2>Carrito</h2>

<div id="listaCarrito"></div>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="pagarPayPal()">Pagar con PayPal</button>

<button onclick="pagarMP()">Pagar con MercadoPago</button>

</div>

<script src="script.js"></script>

</body>

</html>
